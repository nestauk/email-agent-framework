version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  detailed:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  info_file:
    class: logging.FileHandler
    level: INFO
    formatter: detailed
    filename: info.log
    mode: a

  error_file:
    class: logging.FileHandler
    level: ERROR
    formatter: detailed
    filename: errors.log
    mode: a

root:
  level: INFO
  handlers: [console, info_file, error_file]

loggers:
  email_agent:
    level: INFO
    handlers: [console, info_file, error_file]
    propagate: false
